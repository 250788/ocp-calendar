---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-upgrade-calendar-config
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: backend
data:
  # Configuration
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  POLICY_NAMESPACE: "openshift-gitops"
  CRONJOB_NAMESPACE: "openshift-upgrade"
  # Optional: Frontend URL for CORS (adjust as needed)
  FRONTEND_URL: "http://cluster-upgrade-calendar-frontend.open-cluster-management.svc.cluster.local"