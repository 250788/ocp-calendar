---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cluster-upgrade-calendar-backend
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: backend
spec:
  to:
    kind: Service
    name: cluster-upgrade-calendar-backend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None