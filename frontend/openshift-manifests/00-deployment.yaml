---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-upgrade-calendar-frontend-config
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: frontend
data:
  # API endpoint for the frontend
  REACT_APP_API_URL: "http://cluster-upgrade-calendar-backend.open-cluster-management.svc.cluster.local:3000"
  # Or if using route: https://cluster-upgrade-calendar-backend.apps.example.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-upgrade-calendar-frontend
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-upgrade-calendar
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-upgrade-calendar
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: registry.example.com/cluster-upgrade-calendar-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cluster-upgrade-calendar-frontend-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-upgrade-calendar-frontend
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: frontend
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: frontend
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cluster-upgrade-calendar-frontend
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: frontend
spec:
  to:
    kind: Service
    name: cluster-upgrade-calendar-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None