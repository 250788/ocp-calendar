---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-upgrade-calendar
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-upgrade-calendar
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
rules:
  # Read access to cluster resources for discovery
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  # Access to ACM policies
  - apiGroups: ["policy.open-cluster-management.io"]
    resources: ["policies", "placementrules", "placementbindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ACM managed cluster access
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["managedclusters", "managedclustersets"]
    verbs: ["get", "list", "watch"]
  # Kubernetes API discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-upgrade-calendar
  labels:
    app.kubernetes.io/name: cluster-upgrade-calendar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-upgrade-calendar
subjects:
  - kind: ServiceAccount
    name: cluster-upgrade-calendar
    namespace: open-cluster-management